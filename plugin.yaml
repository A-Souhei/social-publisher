name: social-publisher
version: 2.0.0
description: "Create, store, and manage social posts for LinkedIn (manual) and Facebook (optional auto-publish), with AI image generation and a read-only review dashboard"
author: toavinahajaina@gmail.com
provides_tools:
  - generate_image
  - enhance_image
  - create_post
  - update_post
  - publish_post
  - list_posts
  - get_post
  - delete_post
provides_hooks:
  - startup
requires_env:
  - name: OPENAI_API_KEY
    description: "OpenAI API key for GPT Image generation and enhancement"
    url: "https://platform.openai.com/api-keys"
    secret: true
optional_env:
  - name: FACEBOOK_PAGE_ACCESS_TOKEN
    description: "Facebook page access token — required for auto-publishing to Facebook. Without this, Facebook posts are manual."
    url: "https://developers.facebook.com/tools/explorer/"
    secret: true
  - name: FACEBOOK_PAGE_ID
    description: "Numeric Facebook page ID — required alongside FACEBOOK_PAGE_ACCESS_TOKEN for auto-publishing."
    secret: false
